<div class="container-checkbox-STB">

  <div class="btn-filtro-atributo" (click)="openContainerAtributo()">
    <div class="titulo-checkbox">{{descricaoAtributo}}</div>
    <div class="seta-down" [ngClass]="{'seta-up': activeCheckbox, 'seta-down': !activeCheckbox}"></div>
  </div>

  <div class="panel-checkbox-list" [ngStyle]="{ display: !activeCheckbox? 'none' : 'flex'}">
    <div class="card-checkbox">


      <!-- <mat-checkbox (click)="onAtributoChanged(item)">
            {{item.DescItem}}
          </mat-checkbox> -->
      <!-- <mat-selection-list *ngFor="let item of listaAtributo">
            <mat-list-option class="checkbox" (click)="onAtributoChanged(item)">{{item.DescItem}}</mat-list-option>
          </mat-selection-list> -->
      <mat-selection-list #shoes [multiple]="false">
        <mat-list-option *ngFor="let item of listaAtributo" [value]="item" [selected]="item.IdItem == 1" >
          <div class="text-list-option" (click)="onAtributoChanged(item)">{{item.DescItem}}</div>
        </mat-list-option>
      </mat-selection-list>
    </div>
